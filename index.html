<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DY 9U All-Stars</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:#0d1a0f;color:#fff;font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit}
:root{--g:#1a5c2a;--gl:#2a7a3a;--y:#e8e800;--d:#0d1a0f;--c1:#0d160f;--c2:#111a12}

#app{max-width:520px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}

/* Header */
.hdr{background:#0a120c;border-bottom:3px solid var(--g);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr img{width:52px;height:52px;object-fit:contain}
.hdr-t{color:var(--y);font-weight:900;font-size:17px;letter-spacing:2px;line-height:1.1}
.hdr-s{color:var(--gl);font-size:10px;font-weight:600;letter-spacing:1px}

/* Tabs */
.tabs{display:flex;background:#0a120c;border-bottom:1px solid rgba(26,92,42,.3);flex-shrink:0}
.tab{flex:1;padding:10px 1px;background:none;border:none;border-bottom:2px solid transparent;color:#555;font-weight:700;font-size:9px;letter-spacing:.3px;transition:color .15s}
.tab.on{color:var(--y);border-bottom:2px solid var(--y)}

/* Inning bar */
.inn-bar{padding:12px 16px 0;background:#0d160f;display:flex;align-items:center;gap:6px;flex-shrink:0}
.inn-lbl{color:var(--y);font-weight:700;font-size:11px;letter-spacing:1px}
.inn-btn{width:34px;height:34px;border-radius:7px;background:#1a1a1a;color:#666;font-weight:800;font-size:14px;border:1px solid #2a2a2a;transition:all .15s}
.inn-btn.on{background:var(--g);color:#fff;border:2px solid var(--gl)}

/* Content */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sec{padding:14px 16px}
.lbl{color:var(--gl);font-weight:700;font-size:10px;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}
.lbl-y{color:var(--y);font-weight:700;font-size:11px;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}

/* Player grid */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.pbtn{background:#111a12;border:1px solid #222;border-radius:10px;padding:8px 10px;display:flex;align-items:center;gap:8px;text-align:left;transition:all .15s;width:100%}
.pbtn.sel{background:var(--g);border:2px solid var(--y)}
.pbtn.assigned{border-color:rgba(26,92,42,.4)}
.nbadge{background:var(--g);border-radius:5px;padding:2px 7px;min-width:32px;text-align:center;font-size:12px;font-weight:900;color:#fff;font-family:monospace;flex-shrink:0}
.nbadge.s{background:#0d1a0f;border:1px solid var(--y);color:var(--y)}
.pfname{font-size:12px;font-weight:700;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbtn.sel .pfname{color:var(--y)}
.ppos{font-size:10px;color:#444;font-weight:600}
.pbtn.assigned .ppos{color:var(--y)}
.pbtn.sel .ppos{color:rgba(255,255,255,.6)}

/* Field */
.field-wrap{position:relative;width:100%;padding-bottom:86%;border-radius:12px;overflow:hidden}
.field-wrap svg{position:absolute;inset:0;width:100%;height:100%}
.pin{position:absolute;display:flex;flex-direction:column;align-items:center;gap:2px;z-index:10;transform:translate(-50%,-50%)}
.ppin{width:32px;height:32px;border-radius:6px;font-weight:900;font-size:10px;border:2px dashed rgba(26,92,42,.5);background:rgba(0,0,0,.25);color:#aaa;transition:all .15s}
.ppin.filled{background:var(--g);border:2px solid var(--y);color:var(--y);box-shadow:0 0 6px var(--g)}
.ppin.targeting{border:2px solid var(--y);background:rgba(255,255,255,.12);box-shadow:0 0 10px rgba(232,232,0,.4)}
.plbl{background:rgba(0,0,0,.75);border-radius:3px;padding:1px 4px;font-size:8px;color:#888;white-space:nowrap;font-weight:700}
.plbl.filled{color:var(--y)}

/* Progress */
.prog-row{display:flex;align-items:center;gap:8px;margin:10px 0 6px}
.prog-bg{flex:1;background:#1a1a1a;border-radius:4px;height:5px}
.prog-fill{height:5px;background:var(--g);border-radius:4px;transition:width .3s;box-shadow:0 0 6px var(--g)}
.prog-txt{font-size:11px;font-weight:700;color:#555}
.prog-txt.done{color:var(--y)}

/* Action buttons */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.act-btn{background:#111a12;border:1px solid rgba(26,92,42,.25);border-radius:8px;color:#777;font-weight:700;font-size:10px;padding:11px;letter-spacing:.5px}
.act-btn:disabled{color:#2a2a2a}

/* Bench section */
.bench-sec{padding:0 16px 20px}
.bench-lbl{color:#8B6914;font-weight:800;font-size:10px;letter-spacing:1px;margin-bottom:6px}
.bench-sub{color:#444;font-size:11px;margin-bottom:10px}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.bbtn{background:#111a12;border:1px solid #222;border-radius:10px;padding:8px 10px;display:flex;align-items:center;gap:8px;text-align:left;width:100%;transition:all .15s}
.bbtn.benched{background:#1a0d00;border-color:#8B4513}
.bbtn.benched .pfname{color:#a07050}
.bbtn.benched .ppos{color:#8B4513}

/* Batting */
.bat-item{display:flex;align-items:center;gap:10px;background:#111a12;border-radius:10px;padding:9px 12px;margin-bottom:6px;border:1px solid rgba(26,92,42,.2)}
.bat-num{width:28px;height:28px;border-radius:50%;background:var(--g);color:var(--y);font-weight:900;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.arr-col{display:flex;flex-direction:column;gap:1px}
.arr{background:none;border:none;color:#555;font-size:11px;padding:0 4px;line-height:1}
.arr:disabled{color:#222}
.rm-btn{background:#200000;border:none;border-radius:6px;color:#c53935;font-weight:700;padding:4px 8px;font-size:12px}
.add-item{display:flex;width:100%;align-items:center;gap:10px;background:#0d160f;border-radius:10px;padding:9px 12px;margin-bottom:6px;border:1px solid rgba(26,92,42,.1);text-align:left}
.empty{color:#333;text-align:center;padding:24px 0;font-size:13px;border:1px dashed rgba(26,92,42,.25);border-radius:10px;margin-bottom:12px}

/* Pitches */
.pitch-list{background:#0d160f;border-radius:12px;overflow:hidden;border:1px solid rgba(26,92,42,.25);margin-bottom:18px}
.pitch-row{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;border-bottom:1px solid rgba(26,92,42,.1);transition:background .15s}
.pitch-row:last-child{border-bottom:none}
.pitch-row.on{background:rgba(26,92,42,.12)}
.pitch-box{width:34px;height:34px;border-radius:8px;background:#1a1a1a;color:#555;font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.pitch-row.on .pitch-box{background:var(--g);color:var(--y)}
.pitch-name{font-size:13px;font-weight:700;color:#333}
.pitch-name.set{color:#fff}
.pitch-badge{background:var(--g);border-radius:6px;padding:3px 9px;font-size:13px;font-weight:900;color:var(--y)}

/* Roster */
.ros-item{background:#0d160f;border:1px solid rgba(26,92,42,.2);border-radius:10px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.ros-item.out{opacity:.45;border-color:rgba(255,255,255,.05)}
.ros-num{width:36px;height:36px;border-radius:8px;background:var(--g);border:2px solid var(--gl);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:var(--y);flex-shrink:0}
.ros-num.out{background:#2a2a2a;border-color:#333;color:#555}
.ros-name{flex:1;font-weight:600;font-size:13px;cursor:pointer}
.ros-name.out{color:#555;text-decoration:line-through}
.edit-btn{background:none;border:none;color:#333;font-size:14px;padding:4px}
.out-btn{border-radius:6px;font-size:11px;font-weight:800;padding:5px 9px;min-width:44px}
.out-btn.is-out{background:rgba(26,92,42,.25);border:1px solid var(--g);color:var(--gl)}
.out-btn.is-in{background:rgba(180,30,30,.15);border:1px solid #c53935;color:#c53935}
.del-btn{background:#200000;border:none;border-radius:6px;color:#c53935;font-weight:700;padding:4px 8px;font-size:12px}
.add-form{background:#111a12;border:1px solid var(--g);border-radius:10px;padding:12px;margin-bottom:12px}
.add-row{display:flex;gap:8px;margin-bottom:8px}
.add-row input{background:#0d0d0d;border:1px solid var(--g);border-radius:7px;color:#fff;padding:9px 12px;font-size:13px;outline:none}
.add-row input::placeholder{color:#333}
.add-row input:first-child{flex:1}
.add-row input:last-child{width:60px;color:var(--y);font-weight:700;text-align:center}
.il-edit{display:flex;gap:6px;flex:1}
.il-edit input{background:transparent;border:none;color:#fff;font-weight:600;font-size:13px;outline:none;padding:2px 0;border-bottom:1px solid var(--y);flex:1}
.il-edit input:last-child{width:44px;flex:none;border-bottom-color:var(--g);color:var(--y);text-align:center}
.btn-ok{background:var(--g);border:none;border-radius:7px;color:var(--y);font-weight:800;padding:9px;font-size:13px}
.btn-x{background:#1a1a1a;border:none;border-radius:7px;color:#666;padding:9px 12px;font-size:13px}
.ros-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.add-ros-btn{background:var(--g);border:1px solid rgba(232,232,0,.3);border-radius:8px;color:var(--y);font-weight:800;font-size:12px;padding:6px 14px}

/* Game view */
.gv-card{background:#0a120c;border-radius:14px;margin-bottom:14px;overflow:hidden;border:1px solid rgba(26,92,42,.3)}
.gv-hdr{background:var(--g);padding:10px 14px;display:flex;align-items:center;gap:10px}
.gv-num{color:#0d1a0f;font-weight:900;font-size:20px}
.gv-pitcher{background:#0f2e14;padding:8px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(26,92,42,.2)}
.gv-p-badge{background:var(--y);color:#0d1a0f;font-weight:900;font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:4px}
.gv-p-name{color:var(--y);font-weight:700;font-size:14px}
.gv-p-num{color:rgba(232,232,0,.6);font-size:12px;font-weight:700}
.gv-grid{display:grid;grid-template-columns:1fr 1fr}
.gv-pos{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid rgba(26,92,42,.07)}
.gv-pos:nth-child(odd){border-right:1px solid rgba(26,92,42,.07)}
.gv-tag{background:rgba(26,92,42,.4);color:var(--gl);font-weight:800;font-size:9px;padding:2px 5px;border-radius:3px;min-width:24px;text-align:center;flex-shrink:0}
.gv-pnum{color:var(--y);font-weight:900;font-size:11px;flex-shrink:0}
.gv-pname{color:#ddd;font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gv-bench{background:#1a0d00;border-top:1px solid rgba(139,69,19,.25);padding:8px 14px}
.gv-bench-lbl{color:#8B4513;font-size:9px;font-weight:800;letter-spacing:1px;margin-bottom:5px}
.gv-bench-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.gv-bat-card{background:#0a120c;border-radius:14px;margin-bottom:14px;overflow:hidden;border:1px solid rgba(26,92,42,.3)}
.gv-bat-hdr{background:#1a3a0a;padding:10px 14px;display:flex;align-items:center;gap:10px}
.gv-bat-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid rgba(26,92,42,.06)}
.gv-bat-row:last-child{border-bottom:none}
.gv-bat-spot{width:22px;height:22px;border-radius:50%;background:rgba(26,92,42,.5);color:var(--y);font-weight:900;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gv-no{text-align:center;padding:50px 20px;color:#2a3a2a}

/* Export */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.stat-card{background:#111a12;border-radius:8px;padding:10px 8px;text-align:center}
.stat-v{color:var(--y);font-weight:900;font-size:16px}
.stat-l{color:#444;font-size:8px;font-weight:700;letter-spacing:.5px;margin-top:2px}
.lc{background:#0d160f;border:1px solid rgba(26,92,42,.2);border-radius:12px;overflow:hidden;margin-bottom:16px}
.lc-hdr{display:grid;grid-template-columns:28px 1fr 1fr 1fr 1fr 1fr 1fr;background:var(--g);padding:5px 8px;gap:3px}
.lc-h{color:var(--y);font-weight:800;font-size:8px;text-align:center}
.lc-h:first-child{text-align:left}
.lc-row{display:grid;grid-template-columns:28px 1fr 1fr 1fr 1fr 1fr 1fr;padding:4px 8px;gap:3px;border-bottom:1px solid rgba(26,92,42,.06)}
.lc-row:last-child{border-bottom:none}
.lc-row.p-row{background:#0f1f11}
.lc-row.e{background:#0d160f}
.lc-row.o{background:#0a120c}
.lc-pos{font-size:8px;font-weight:800;color:var(--gl);display:flex;align-items:center}
.lc-pos.p{color:var(--y)}
.lc-cell{text-align:center}
.lc-num{font-size:8px;font-weight:900;color:var(--y)}
.lc-nm{font-size:7px;color:#aaa}
.lc-mt{font-size:8px;color:#222}
.exp-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.exp-btn{border-radius:10px;font-weight:800;font-size:13px;padding:14px;display:flex;align-items:center;justify-content:center;gap:8px;border:none}
.exp-btn.pri{background:var(--g);color:var(--y);border:1px solid rgba(232,232,0,.25)}
.exp-btn.sec{background:#111a12;color:#ccc;border:1px solid var(--g)}
.exp-btn.ter{background:#111a12;color:#888;border:1px solid rgba(26,92,42,.25)}
.exp-btn.danger{background:#1a0000;color:#c53935;border:1px solid #c53935}

/* Toast */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--g);color:var(--y);font-weight:700;font-size:13px;padding:10px 22px;border-radius:50px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* Confirm modal */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9000;align-items:center;justify-content:center;padding:24px}
#modal.on{display:flex}
.modal-box{background:#111a12;border:1px solid #c53935;border-radius:16px;padding:24px;max-width:300px;width:100%;text-align:center}
.modal-t{color:#c53935;font-weight:900;font-size:16px;margin-bottom:8px}
.modal-m{color:#aaa;font-size:13px;margin-bottom:20px;line-height:1.5}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-y{background:#c53935;border:none;border-radius:8px;color:#fff;font-weight:800;font-size:14px;padding:12px;cursor:pointer}
.modal-n{background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#888;font-weight:700;font-size:14px;padding:12px;cursor:pointer}

/* Overlay for text export */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;flex-direction:column;padding:16px}
#overlay.on{display:flex}
.ov-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ov-title{color:var(--y);font-weight:800;font-size:14px;letter-spacing:1px}
.ov-close{background:var(--g);border:none;border-radius:50%;width:32px;height:32px;color:var(--y);font-size:18px;font-weight:700}
.ov-sub{color:#555;font-size:11px;margin-bottom:10px}
#ov-ta{flex:1;background:#0d1a0f;border:1px solid var(--g);border-radius:8px;color:#ccc;font-family:monospace;font-size:12px;padding:12px;resize:none;outline:none;line-height:1.5}
.ov-copy{margin-top:10px;background:var(--g);border:1px solid var(--y);border-radius:10px;color:var(--y);font-weight:800;font-size:14px;padding:14px;cursor:pointer}

/* Footer */
.footer{text-align:center;padding:16px;border-top:1px solid rgba(26,92,42,.1)}
.footer-m{color:var(--g);font-size:11px;font-weight:700;letter-spacing:2px}
.footer-s{color:#222;font-size:10px;margin-top:4px;letter-spacing:1px}
</style>
</head>

    <div class="modal-btns">
      <button class="modal-n" onclick="closeModal()">Cancel</button>
      <button class="modal-y" onclick="doClear()">Clear &amp; Start</button>
    </div>
  </div>

  <div class="ov-hdr">
    <div class="ov-title">&#128203; LINEUP TEXT</div>
    <button class="ov-close" onclick="closeOverlay()">&times;</button>
  </div>
  <div class="ov-sub">Tap SELECT ALL then copy &rarr; paste into Notes or Messages</div>
  <textarea id="ov-ta" readonly></textarea>
  <button class="ov-copy" onclick="doCopy()">SELECT ALL &amp; COPY</button>
</div>

<script>
var INN=[1,2,3,4,5,6];
var PL={P:"Pitcher",C:"Catcher","1B":"1st Base","2B":"2nd Base","3B":"3rd Base",SS:"Shortstop",LF:"Left Field",CF:"Center Field",RF:"Right Field"};
var FP=[{id:"CF",x:50,y:12},{id:"LF",x:18,y:22},{id:"RF",x:82,y:22},{id:"SS",x:35,y:42},{id:"2B",x:60,y:38},{id:"3B",x:22,y:56},{id:"1B",x:78,y:56},{id:"P",x:50,y:58},{id:"C",x:50,y:78}];
var ROSTER=[
  {name:"Joey Jenkins",number:11},
  {name:"Bodhi Gardner",number:1},
  {name:"Landon Sullivan",number:3},
  {name:"Cody Brunetti",number:99},
  {name:"Charles Hoppen",number:5},
  {name:"Wiley Shea",number:8},
  {name:"Henry Farrow",number:34},
  {name:"Finn Hendrickx",number:17},
  {name:"Rory Hendrickx",number:7},
  {name:"Gregory Buckley",number:12},
  {name:"Luke Bridges",number:44}
];

// ── State ──
var S={
  tab:"field",
  inn:1,
  players: ROSTER.map(function(p){return{name:p.name,number:p.number};}),
  fields:{1:{},2:{},3:{},4:{},5:{},6:{}},
  pitchers:{1:null,2:null,3:null,4:null,5:null,6:null},
  batting:[],
  bench:{1:[],2:[],3:[],4:[],5:[],6:[]},
  out:[],   // player names marked absent
  sel:null,
  editing:-1,
  adding:false
};

// ── localStorage (safe - never throws) ──
var LS=(function(){
  var ok=false;
  try{localStorage.setItem("_t","1");localStorage.removeItem("_t");ok=true;}catch(e){}
  return{
    get:function(k){if(!ok)return null;try{return localStorage.getItem(k);}catch(e){return null;}},
    set:function(k,v){if(!ok)return;try{localStorage.setItem(k,v);}catch(e){}},
    del:function(k){if(!ok)return;try{localStorage.removeItem(k);}catch(e){}}
  };
})();

function save(){
  try{
    LS.set("dy9u2",JSON.stringify({
      players:S.players,
      fields:S.fields,
      pitchers:S.pitchers,
      batting:S.batting,
      bench:S.bench,
      out:S.out
    }));
  }catch(e){}
}

function load(){
  // Version check - wipe old incompatible saved data
  var VERSION="3";
  var savedVersion=LS.get("dy9u_v");
  if(savedVersion!==VERSION){
    LS.del("dy9u2");
    LS.set("dy9u_v",VERSION);
    return; // use default state
  }
  try{
    var raw=LS.get("dy9u2");
    if(!raw)return;
    var d=JSON.parse(raw);
    if(!d||typeof d!=="object")return;
    if(Array.isArray(d.players)&&d.players.length>0) S.players=d.players;
    if(d.fields&&typeof d.fields==="object") S.fields=d.fields;
    if(d.pitchers&&typeof d.pitchers==="object") S.pitchers=d.pitchers;
    if(Array.isArray(d.batting)) S.batting=d.batting;
    if(d.bench&&typeof d.bench==="object"){
      INN.forEach(function(i){S.bench[i]=Array.isArray(d.bench[i])?d.bench[i]:[];});
    }
    if(Array.isArray(d.out)) S.out=d.out;
    // ensure all innings exist
    INN.forEach(function(i){
      if(!S.fields[i])S.fields[i]={};
      if(!S.bench[i])S.bench[i]=[];
      if(S.pitchers[i]===undefined)S.pitchers[i]=null;
    });
  }catch(e){LS.del("dy9u2");}
}
load();

// ── Helpers ──
function isOut(name){return S.out.indexOf(name)>=0;}
function activePlayers(){return S.players.filter(function(p){return !isOut(p.name);});}
function byName(name){return S.players.filter(function(p){return p.name===name;})[0]||null;}
function fieldedPos(name){
  var pos=S.fields[S.inn]||{};
  var found=null;
  Object.keys(pos).forEach(function(k){if(pos[k]===name)found=k;});
  return found;
}
function isBenched(name){return (S.bench[S.inn]||[]).indexOf(name)>=0;}
function isFielded(name){
  var pos=S.fields[S.inn]||{};
  return Object.values(pos).indexOf(name)>=0||S.pitchers[S.inn]===name;
}
function nb(num,sel){
  return '<div class="nbadge'+(sel?" s":"")+'">#'+num+'</div>';
}
function toast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("on");
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("on");},2200);
}

// ── Navigation ──
function go(tab){
  S.tab=tab;S.sel=null;
  var tabs=document.getElementById("tabs").querySelectorAll(".tab");
  var names=["game","field","bat","pitch","roster","export"];
  tabs.forEach(function(b,i){b.classList.toggle("on",names[i]===tab);});
  var bar=document.getElementById("inn-bar");
  bar.style.display=(tab==="field"||tab==="pitch")?"flex":"none";
  render();
}
function setInn(i){
  S.inn=i;S.sel=null;
  INN.forEach(function(n){document.getElementById("ib"+n).classList.toggle("on",n===i);});
  render();
}

// ── Field actions ──
function selPlayer(name){S.sel=(S.sel===name)?null:name;render();}
function assignPos(posId){
  if(!S.sel)return;
  var cur=S.fields[S.inn]||{};
  // remove from old pos
  Object.keys(cur).forEach(function(k){if(cur[k]===S.sel)delete cur[k];});
  // remove from bench if benched
  S.bench[S.inn]=S.bench[S.inn].filter(function(n){return n!==S.sel;});
  cur[posId]=S.sel;
  S.fields[S.inn]=cur;
  S.sel=null;
  render();save();
}
function clearPos(posId){
  var cur=S.fields[S.inn]||{};
  delete cur[posId];
  S.fields[S.inn]=cur;
  render();save();
}
function clearInn(){
  S.fields[S.inn]={};
  S.pitchers[S.inn]=null;
  S.bench[S.inn]=[];
  S.sel=null;
  render();save();
}
function copyPrev(){
  if(S.inn<=1)return;
  S.fields[S.inn]=Object.assign({},S.fields[S.inn-1]);
  S.pitchers[S.inn]=S.pitchers[S.inn-1];
  render();save();
}

// ── Bench ──
function toggleBench(name){
  var arr=S.bench[S.inn];
  var idx=arr.indexOf(name);
  if(idx>=0){
    arr.splice(idx,1);
  } else {
    arr.push(name);
    // remove from field if assigned
    var cur=S.fields[S.inn]||{};
    Object.keys(cur).forEach(function(k){if(cur[k]===name)delete cur[k];});
    if(S.pitchers[S.inn]===name)S.pitchers[S.inn]=null;
  }
  render();save();
}

// ── Batting ──
function addBat(name){
  if(S.batting.indexOf(name)<0)S.batting.push(name);
  render();save();
}
function removeBat(name){
  S.batting=S.batting.filter(function(n){return n!==name;});
  render();save();
}
function moveBat(i,dir){
  var ni=i+dir;
  if(ni<0||ni>=S.batting.length)return;
  var tmp=S.batting[i];S.batting[i]=S.batting[ni];S.batting[ni]=tmp;
  render();save();
}

// ── Pitchers ──
function togglePitch(name){
  S.pitchers[S.inn]=(S.pitchers[S.inn]===name)?null:name;
  render();save();
}

// ── Roster ──
function toggleOut(idx){
  var name=S.players[idx].name;
  var i=S.out.indexOf(name);
  if(i>=0){
    S.out.splice(i,1);
  } else {
    S.out.push(name);
    INN.forEach(function(n){
      var cur=S.fields[n]||{};
      Object.keys(cur).forEach(function(k){if(cur[k]===name)delete cur[k];});
      if(S.pitchers[n]===name)S.pitchers[n]=null;
      S.bench[n]=S.bench[n].filter(function(x){return x!==name;});
    });
    S.batting=S.batting.filter(function(n){return n!==name;});
  }
  render();save();
}
function delPlayer(idx){
  var name=S.players[idx].name;
  S.players.splice(idx,1);
  INN.forEach(function(n){
    var cur=S.fields[n]||{};
    Object.keys(cur).forEach(function(k){if(cur[k]===name)delete cur[k];});
    if(S.pitchers[n]===name)S.pitchers[n]=null;
    S.bench[n]=S.bench[n].filter(function(x){return x!==name;});
  });
  S.batting=S.batting.filter(function(n){return n!==name;});
  S.out=S.out.filter(function(n){return n!==name;});
  render();save();
}
function startEdit(idx){S.editing=idx;render();}
function saveEdit(){
  var ne=document.getElementById("e-name");
  var nu=document.getElementById("e-num");
  if(!ne)return;
  var old=S.players[S.editing].name;
  var nn=ne.value.trim()||old;
  var num=parseInt(nu.value)||S.players[S.editing].number;
  S.players[S.editing]={name:nn,number:num};
  if(nn!==old){
    INN.forEach(function(i){
      var cur=S.fields[i]||{};
      Object.keys(cur).forEach(function(k){if(cur[k]===old)cur[k]=nn;});
      if(S.pitchers[i]===old)S.pitchers[i]=nn;
      S.bench[i]=S.bench[i].map(function(x){return x===old?nn:x;});
    });
    S.batting=S.batting.map(function(x){return x===old?nn:x;});
    var oi=S.out.indexOf(old);if(oi>=0)S.out[oi]=nn;
  }
  S.editing=-1;render();save();
}
function cancelEdit(){S.editing=-1;render();}
function addPlayer(){
  var ne=document.getElementById("n-name");
  var nu=document.getElementById("n-num");
  var name=ne?ne.value.trim():"";
  if(!name)return;
  S.players.push({name:name,number:parseInt(nu.value)||0});
  S.adding=false;render();save();
}
function cancelAdd(){S.adding=false;render();}

// ── Clear game ──
function clearGame(){document.getElementById("modal").classList.add("on");}
function closeModal(){document.getElementById("modal").classList.remove("on");}
function doClear(){
  closeModal();
  S.fields={1:{},2:{},3:{},4:{},5:{},6:{}};
  S.pitchers={1:null,2:null,3:null,4:null,5:null,6:null};
  S.batting=[];
  S.bench={1:[],2:[],3:[],4:[],5:[],6:[]};
  S.sel=null;S.inn=1;
  INN.forEach(function(n){document.getElementById("ib"+n).classList.toggle("on",n===1);});
  render();save();
  toast("Ready for new game!");
}

// ── Export text ──
function buildText(){
  var lines=["DY 9U ALL-STARS — DENNIS/YARMOUTH","=================================",""];
  if(S.batting.length){
    lines.push("BATTING ORDER");lines.push("-------------");
    S.batting.forEach(function(n,i){var p=byName(n);lines.push("  "+(i+1)+". #"+(p?p.number:"?")+"	"+n);});
    lines.push("");
  }
  lines.push("FIELDING BY INNING");lines.push("------------------");
  INN.forEach(function(inn){
    var pos=S.fields[inn]||{};var pit=S.pitchers[inn];
    if(!Object.keys(pos).length&&!pit)return;
    lines.push("Inning "+inn+":");
    if(pit){var p=byName(pit);lines.push("  P  (Pitcher)    — #"+(p?p.number:"?")+" "+pit);}
    ["C","1B","2B","3B","SS","LF","CF","RF"].forEach(function(pid){
      if(pos[pid]){var p=byName(pos[pid]);lines.push("  "+pid+"  ("+PL[pid]+") — #"+(p?p.number:"?")+" "+pos[pid]);}
    });
    if((S.bench[inn]||[]).length){lines.push("  BENCH: "+S.bench[inn].join(", "));}
    lines.push("");
  });
  if(INN.some(function(i){return S.pitchers[i];})){
    lines.push("PITCHING");lines.push("--------");
    INN.forEach(function(i){if(S.pitchers[i]){var p=byName(S.pitchers[i]);lines.push("  Inn "+i+": #"+(p?p.number:"?")+" "+S.pitchers[i]);}});
    lines.push("");
  }
  lines.push("ONE TEAM. ONE GOAL. ALL STARS. ALL HEART.");
  return lines.join("\n");
}
function showOverlay(txt){
  var el=document.getElementById("ov-ta");
  el.value=txt;
  document.getElementById("overlay").classList.add("on");
  setTimeout(function(){el.focus();el.select();el.setSelectionRange(0,el.value.length);},100);
}
function closeOverlay(){document.getElementById("overlay").classList.remove("on");}
function doCopy(){
  var ta=document.getElementById("ov-ta");
  ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);
  var ok=false;
  try{ok=document.execCommand("copy");}catch(e){}
  if(!ok&&navigator.clipboard)navigator.clipboard.writeText(ta.value).catch(function(){});
  toast("Copied!");
}
function dlFile(content,name,type){
  try{
    var b=new Blob([content],{type:type});
    var u=URL.createObjectURL(b);
    var a=document.createElement("a");
    a.href=u;a.download=name;a.style.display="none";
    document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(u);document.body.removeChild(a);},500);
    toast("Downloading...");
  }catch(e){showOverlay(content);}
}
function dlCSV(){
  var rows=[["Inning","Position","#","Player","Pitcher"]];
  INN.forEach(function(inn){
    var pos=S.fields[inn]||{};var pit=S.pitchers[inn];
    if(pit){var p=byName(pit);rows.push([inn,"P - Pitcher",p?p.number:"",pit,"YES"]);}
    Object.keys(pos).forEach(function(pid){var p=byName(pos[pid]);rows.push([inn,pid+" - "+PL[pid],p?p.number:"",pos[pid],""]);});
  });
  rows.push([]);rows.push(["BATTING ORDER"]);rows.push(["Spot","#","Player"]);
  S.batting.forEach(function(n,i){var p=byName(n);rows.push([i+1,p?p.number:"",n]);});
  dlFile(rows.map(function(r){return r.join(",");}).join("\n"),"DY-Lineup.csv","text/csv;charset=utf-8");
}
function doPDF(){
  var POSLIST=["C","1B","2B","3B","SS","LF","CF","RF"];
  var tbl='<tr style="background:#1a5c2a;color:#e8e800"><th>POS</th>'+INN.map(function(i){return'<th>INN '+i+'</th>';}).join("")+'</tr>';
  tbl+='<tr style="background:#0f2e14"><td style="color:#e8e800;font-weight:bold">P</td>'+INN.map(function(i){var n=S.pitchers[i];var p=n?byName(n):null;return'<td>'+(p?'<b>#'+p.number+'</b><br>'+n.split(" ")[0]:"—")+'</td>';}).join("")+'</tr>';
  POSLIST.forEach(function(pid,ri){
    tbl+='<tr style="background:'+(ri%2===0?"#0d1a10":"#0a1209")+'"><td style="color:#2a7a3a;font-weight:bold">'+pid+'</td>'+INN.map(function(i){var nm=(S.fields[i]||{})[pid];var p=nm?byName(nm):null;return'<td>'+(p?'<b>#'+p.number+'</b><br>'+nm.split(" ")[0]:"—")+'</td>';}).join("")+'</tr>';
  });
  var batR=S.batting.map(function(n,i){var p=byName(n);return'<tr style="background:'+(i%2===0?"#0d1a10":"#0a1209")+'"><td>'+(i+1)+'</td><td style="color:#e8e800;font-weight:bold">#'+(p?p.number:"")+'</td><td>'+n+'</td></tr>';}).join("");
  var pitR=INN.filter(function(i){return S.pitchers[i];}).map(function(i){var p=byName(S.pitchers[i]);return'<tr><td>Inn '+i+'</td><td style="color:#e8e800;font-weight:bold">#'+(p?p.number:"")+'</td><td>'+S.pitchers[i]+'</td></tr>';}).join("");
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>DY Lineup</title><style>body{margin:20px;background:#0d1a0f;color:#ddd;font-family:Arial,sans-serif;font-size:13px}h1{color:#e8e800;font-size:20px;margin:0 0 2px;letter-spacing:2px}h2{color:#2a7a3a;font-size:11px;margin:0 0 16px}h3{color:#e8e800;font-size:12px;margin:16px 0 6px;border-bottom:1px solid #1a5c2a;padding-bottom:3px}table{width:100%;border-collapse:collapse}td,th{padding:4px 6px;text-align:center;font-size:11px;border:1px solid #1a3a1a}td:first-child,th:first-child{text-align:left}.ft{margin-top:20px;text-align:center;color:#1a5c2a;font-size:10px;letter-spacing:2px;padding-top:10px;border-top:1px solid #1a3a1a}@media print{body{background:#0d1a0f!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body><h1>DY 9U ALL-STARS</h1><h2>DENNIS / YARMOUTH &bull; LINEUP CARD</h2><h3>FIELDING</h3><table>'+tbl+'</table>'+(S.batting.length?'<h3>BATTING ORDER</h3><table><tr style="background:#1a5c2a;color:#e8e800"><th>#</th><th>Jersey</th><th>Player</th></tr>'+batR+'</table>':'')+(pitR?'<h3>PITCHING</h3><table><tr style="background:#1a5c2a;color:#e8e800"><th>Inning</th><th>Jersey</th><th>Pitcher</th></tr>'+pitR+'</table>':'')+'<div class="ft">ONE TEAM. ONE GOAL. &bull; ALL STARS. ALL HEART.</div><script>window.onload=function(){window.print();}<\/script></body></html>';
  var printDiv=document.createElement("div");
  printDiv.id="pf";printDiv.innerHTML=html;
  var st=document.createElement("style");
  st.id="ps";st.textContent='@media print{body>*:not(#pf){display:none!important}#pf{display:block!important}body{background:#0d1a0f!important;margin:0}-webkit-print-color-adjust:exact;print-color-adjust:exact}@media screen{#pf{display:none}}';
  document.head.appendChild(st);document.body.appendChild(printDiv);
  window.print();
  setTimeout(function(){var s=document.getElementById("ps");var d=document.getElementById("pf");if(s)s.remove();if(d)d.remove();},1000);
}

// ── Render ──
function rfNb(num,sel){return'<div class="nbadge'+(sel?' s':'')+'">#'+num+'</div>';}

function handlePosClick(btn){
  var posId=btn.dataset.pos;
  if(S.sel){assignPos(posId);}
  else if((S.fields[S.inn]||{})[posId]){clearPos(posId);}
}
function renderField(){
  var pos=S.fields[S.inn]||{};
  var filled=Object.keys(pos).length;
  var active=activePlayers();
  var html='<div class="sec"><div class="lbl">&#9312; Tap a player</div><div class="pgrid">';
  active.forEach(function(pl){
    var fp=fieldedPos(pl.name);
    var sel=(S.sel===pl.name);
    html+='<button class="pbtn'+(sel?' sel':'')+(fp&&!sel?' assigned':'')+'" onclick="selPlayer(this.dataset.n)" data-n="'+pl.name.replace(/"/g,'&quot;')+'">'+rfNb(pl.number,sel)+'<div style="flex:1;min-width:0"><div class="pfname">'+pl.name.split(' ')[0]+'</div><div class="ppos">'+(fp||'unassigned')+'</div></div></button>';
  });
  html+='</div></div><div class="sec" style="padding-top:6px"><div class="lbl">&#9313; Tap a position'+(S.sel?' &mdash; placing <b style="color:#fff;font-weight:500">'+S.sel.split(' ')[0]+'</b>':'')+'</div>';
  // Field SVG
  html+='<div class="field-wrap"><svg viewBox="0 0 100 86"><rect width="100" height="86" fill="#0e200f"/><path d="M5,86 Q50,4 95,86 Z" fill="#1a4a1a"/><path d="M5,86 Q50,10 95,86 Z" fill="#1e521e" opacity=".5"/>';
  for(var i=0;i<6;i++)html+='<path d="M'+(5+i*15)+',86 Q50,'+(10+i*4)+' '+(95-i*15)+',86" fill="none" stroke="#fff" stroke-width=".15" opacity=".08"/>';
  html+='<path d="M32,86 L50,52 L68,86 Z" fill="#7a5510" opacity=".6"/><ellipse cx="50" cy="56" rx="3" ry="2" fill="#8B6914" opacity=".8"/><rect x="48.5" y="44" width="3" height="3" rx=".3" fill="white" transform="rotate(45 50 45.5)"/><rect x="62" y="51" width="3" height="3" rx=".3" fill="white" transform="rotate(45 63.5 52.5)"/><rect x="35" y="51" width="3" height="3" rx=".3" fill="white" transform="rotate(45 36.5 52.5)"/><rect x="48.5" y="70" width="3" height="3" rx=".3" fill="white" transform="rotate(45 50 71.5)"/><line x1="50" y1="71" x2="5" y2="86" stroke="white" stroke-width=".4"/><line x1="50" y1="71" x2="95" y2="86" stroke="white" stroke-width=".4"/><line x1="50" y1="45.5" x2="63.5" y2="52.5" stroke="#8B6914" stroke-width=".5" opacity=".6"/><line x1="63.5" y1="52.5" x2="50" y2="71" stroke="#8B6914" stroke-width=".5" opacity=".6"/><line x1="50" y1="71" x2="36.5" y2="52.5" stroke="#8B6914" stroke-width=".5" opacity=".6"/><line x1="36.5" y1="52.5" x2="50" y2="45.5" stroke="#8B6914" stroke-width=".5" opacity=".6"/></svg>';
  FP.forEach(function(fp){
    var asgn=pos[fp.id];var p=asgn?byName(asgn):null;
    html+='<div class="pin" style="left:'+fp.x+'%;top:'+fp.y+'%"><button class="ppin'+(asgn?' filled':'')+(S.sel?' targeting':'')+'" data-pos="'+fp.id+'" onclick="handlePosClick(this)">'+(asgn?'#'+(p?p.number:'?'):fp.id)+'</button><div class="plbl'+(asgn?' filled':'')+'">'+(asgn?asgn.split(' ')[0].toUpperCase():fp.id)+'</div></div>';
  });
  html+='</div>';
  // Progress
  html+='<div class="prog-row"><div class="prog-bg"><div class="prog-fill" style="width:'+Math.round((filled/9)*100)+'%"></div></div><span class="prog-txt'+(filled===9?' done':'')+'">'+filled+'/9</span></div>';
  // Actions
  html+='<div class="act-grid"><button class="act-btn" onclick="clearInn()">&#8635; CLEAR INNING</button><button class="act-btn" onclick="copyPrev()" '+(S.inn<=1?'disabled':'')+'>&#10736; COPY PREV</button></div></div>';
  // Bench section
  var benched=S.bench[S.inn]||[];
  var benchable=active.filter(function(pl){return !isFielded(pl.name);});
  html+='<div class="bench-sec"><div class="bench-lbl">&#x26FA; BENCH &mdash; INNING '+S.inn+'</div>';
  if(benchable.length===0){
    html+='<div style="color:#333;font-size:12px;padding:8px 0">All active players are fielded this inning</div>';
  } else {
    html+='<div class="bench-sub">Tap to mark a player on the bench this inning</div><div class="bgrid">';
    benchable.forEach(function(pl){
      var b=isBenched(pl.name);
      html+='<button class="bbtn'+(b?' benched':'')+'" data-n="'+pl.name.replace(/"/g,'&quot;')+'" onclick="toggleBench(this.dataset.n)">'+rfNb(pl.number,false)+'<div style="flex:1;min-width:0"><div class="pfname" style="color:'+(b?'#a07050':'#ddd')+'">'+pl.name.split(' ')[0]+'</div><div class="ppos" style="color:'+(b?'#8B4513':'#444')+';font-weight:700">'+(b?'BENCH':'available')+'</div></div></button>';
    });
    html+='</div>';
  }
  html+='</div>';
  return html;
}

function renderBat(){
  var html='<div class="sec"><div class="lbl-y">Batting Order</div><div style="color:#444;font-size:11px;margin-bottom:12px">Same order all innings</div>';
  if(!S.batting.length){html+='<div class="empty">Tap players below to set the order</div>';}
  else{
    S.batting.forEach(function(name,i){
      var p=byName(name);
      html+='<div class="bat-item"><div class="bat-num">'+(i+1)+'</div>'+rfNb(p?p.number:'?',false)+'<span style="flex:1;font-weight:600;font-size:13px">'+name+'</span><div class="arr-col"><button class="arr" onclick="moveBat('+i+',-1)" '+(i===0?'disabled':'')+'>&#9650;</button><button class="arr" onclick="moveBat('+i+',1)" '+(i===S.batting.length-1?'disabled':'')+'>&#9660;</button></div><button class="rm-btn" data-n="'+name.replace(/"/g,'&quot;')+'" onclick="removeBat(this.dataset.n)">&#10005;</button></div>';
    });
  }
  var unset=S.players.filter(function(p){return !isOut(p.name)&&S.batting.indexOf(p.name)<0;});
  if(unset.length){
    html+='<div class="lbl" style="margin-top:12px">Add to order</div>';
    unset.forEach(function(pl){
      html+='<button class="add-item" data-n="'+pl.name.replace(/"/g,'&quot;')+'" onclick="addBat(this.dataset.n)"><span style="color:var(--gl);font-weight:900;font-size:16px">+</span>'+rfNb(pl.number,false)+'<span style="flex:1;color:#888;font-weight:600;font-size:13px">'+pl.name+'</span></button>';
    });
  }
  html+='</div>';return html;
}

function renderPitch(){
  var html='<div class="sec"><div class="lbl-y">Pitcher by Inning</div><div class="pitch-list">';
  INN.forEach(function(inn,i){
    var pit=S.pitchers[inn];var p=pit?byName(pit):null;var isOn=(S.inn===inn);
    html+='<div class="pitch-row'+(isOn?' on':'')+'" onclick="setInn('+inn+')"><div class="pitch-box">'+inn+'</div><div style="flex:1"><div style="font-size:9px;color:#444;font-weight:700;letter-spacing:1px">INNING '+inn+'</div><div class="pitch-name'+(pit?' set':'')+'">'+( pit||'— unassigned —')+'</div></div>'+(p?'<div class="pitch-badge">#'+p.number+'</div>':'')+(pit?'<button class="rm-btn" onclick="event.stopPropagation();S.pitchers['+inn+']=null;render();save();">&#10005;</button>':'')+'</div>';
  });
  html+='</div><div class="lbl">Assign pitcher &mdash; Inning '+S.inn+'</div><div class="pgrid">';
  activePlayers().forEach(function(pl){
    var isA=(S.pitchers[S.inn]===pl.name);
    var innings=INN.filter(function(i){return S.pitchers[i]===pl.name;});
    html+='<button class="pbtn'+(isA?' sel':'')+'" data-n="'+pl.name.replace(/"/g,'&quot;')+'" onclick="togglePitch(this.dataset.n)">'+rfNb(pl.number,isA)+'<div><div class="pfname" style="color:'+(isA?'var(--y)':'#ddd')+'">'+pl.name.split(' ')[0]+'</div>'+(innings.length?'<div style="font-size:9px;color:'+(isA?'rgba(255,255,255,.6)':'var(--gl)')+';font-weight:600">inn '+innings.join(',')+'</div>':'')+'</div></button>';
  });
  html+='</div></div>';return html;
}

function renderRoster(){
  var active=S.players.filter(function(p){return !isOut(p.name);});
  var out=S.players.filter(function(p){return isOut(p.name);});
  var html='<div class="sec"><div class="ros-hdr"><div class="lbl-y" style="margin:0">Roster &middot; '+active.length+' active'+(out.length?' &middot; '+out.length+' out':'')+'</div><button class="add-ros-btn" onclick="S.adding=true;render()">+ ADD</button></div>';
  if(S.adding){
    html+='<div class="add-form"><div class="add-row"><input id="n-name" placeholder="Player name" onkeydown="var k=event.key;if(k==&quot;Enter&quot;)addPlayer();if(k==&quot;Escape&quot;)cancelAdd();" autofocus><input id="n-num" placeholder="#" type="number" style="width:60px;color:var(--y);font-weight:700;text-align:center"></div><div style="display:flex;gap:8px"><button class="btn-ok" style="flex:1" onclick="addPlayer()">ADD</button><button class="btn-x" onclick="cancelAdd()">&#10005;</button></div></div>';
  }
  S.players.forEach(function(pl,idx){
    var out=isOut(pl.name);var editing=(S.editing===idx);
    html+='<div class="ros-item'+(out?' out':'')+'"><div class="ros-num'+(out?' out':'')+'">#'+pl.number+'</div>';
    if(editing){
      html+='<div class="il-edit"><input id="e-name" value="'+pl.name+'" onkeydown="var k=event.key;if(k==&quot;Enter&quot;)saveEdit();if(k==&quot;Escape&quot;)cancelEdit();" autofocus><input id="e-num" value="'+pl.number+'" type="number"></div><button class="btn-ok" style="padding:6px 10px;font-size:12px" onclick="saveEdit()">&#10003;</button>';
    } else {
      html+='<span class="ros-name'+(out?' out':'')+'" onclick="startEdit('+idx+')">'+pl.name+'</span><button class="edit-btn" onclick="startEdit('+idx+')">&#9998;</button>';
    }
    html+='<button class="out-btn '+(out?'is-out':'is-in')+'" onclick="toggleOut('+idx+')">'+(out?'&#10003; IN':'OUT')+'</button>';
        html+='<button class="del-btn" data-idx="'+idx+'" onclick="delPlayer(parseInt(this.dataset.idx))">&#128465;</button>';
    html+='</div>';
  });
  html+='<div class="footer"><div class="footer-m">ONE TEAM. ONE GOAL.</div><div class="footer-s">ALL STARS. ALL HEART.</div></div></div>';
  return html;
}

function renderGame(){
  var hasAny=INN.some(function(i){return Object.keys(S.fields[i]||{}).length>0||S.pitchers[i];});
  if(!hasAny){
    return'<div class="sec"><div class="gv-no"><div style="font-size:40px">&#9918;</div><div style="color:#3a5a3a;font-weight:600;font-size:14px;margin:12px 0 6px">No lineup built yet</div><div style="color:#2a3a2a;font-size:11px">Set fielding positions &amp; pitchers<br>then come back here on game day</div></div></div>';
  }
  var PORD=["C","1B","2B","3B","SS","LF","CF","RF"];
  var html='<div style="padding:12px 14px 0"><div style="color:var(--y);font-weight:900;font-size:16px;letter-spacing:1px">GAME DAY</div><div style="color:#444;font-size:11px;margin-top:2px;margin-bottom:14px">All innings at a glance</div>';
  INN.forEach(function(inn){
    var pos=S.fields[inn]||{};var pit=S.pitchers[inn];var bnch=S.bench[inn]||[];
    var cnt=Object.keys(pos).length+(pit?1:0);
    if(cnt===0)return;
    html+='<div class="gv-card"><div class="gv-hdr"><div class="gv-num">'+inn+'</div><div><div style="color:#0d1a0f;font-weight:900;font-size:13px;letter-spacing:1px">INNING '+inn+'</div><div style="color:rgba(0,30,0,.6);font-size:10px;font-weight:600">'+cnt+' of 9 set</div></div></div>';
    if(pit){var pp=byName(pit);html+='<div class="gv-pitcher"><div class="gv-p-badge">PITCHER</div><div style="flex:1"><span class="gv-p-name">'+pit+'</span></div><div class="gv-p-num">#'+(pp?pp.number:'?')+'</div></div>';}
    var fp=PORD.filter(function(p){return pos[p];});
    if(fp.length){
      html+='<div class="gv-grid">';
      fp.forEach(function(pid){var nm=pos[pid];var p=byName(nm);html+='<div class="gv-pos"><div class="gv-tag">'+pid+'</div><div class="gv-pnum">#'+(p?p.number:'?')+'</div><div class="gv-pname">'+nm.split(' ')[0]+'</div></div>';});
      if(fp.length%2!==0)html+='<div class="gv-pos"></div>';
      html+='</div>';
    }
    if(bnch.length){
      html+='<div class="gv-bench"><div class="gv-bench-lbl">&#x26FA; BENCH</div>';
      bnch.forEach(function(nm){var p=byName(nm);html+='<div class="gv-bench-row"><div style="color:#a07050;font-weight:900;font-size:11px;min-width:30px">#'+(p?p.number:'?')+'</div><div style="color:#a07050;font-size:12px;font-weight:600">'+nm+'</div></div>';});
      html+='</div>';
    }
    html+='</div>';
  });
  if(S.batting.length){
    html+='<div class="gv-bat-card"><div class="gv-bat-hdr"><div style="font-size:18px">&#127921;</div><div><div style="color:#0d1a0f;font-weight:900;font-size:13px;letter-spacing:1px">BATTING ORDER</div><div style="color:rgba(0,30,0,.6);font-size:10px;font-weight:600">'+S.batting.length+' batters</div></div></div>';
    S.batting.forEach(function(name,i){var p=byName(name);html+='<div class="gv-bat-row"><div class="gv-bat-spot">'+(i+1)+'</div><div style="min-width:32px;color:var(--y);font-weight:900;font-size:11px">#'+(p?p.number:'?')+'</div><div style="color:#ddd;font-size:12px;font-weight:600">'+name+'</div></div>';});
    html+='</div>';
  }
  html+='</div>';return html;
}

function renderExport(){
  var tf=INN.filter(function(i){return Object.keys(S.fields[i]||{}).length>0;}).length;
  var tp=INN.filter(function(i){return S.pitchers[i];}).length;
  var html='<div class="sec"><div class="lbl-y">Export Lineup</div><div style="color:#444;font-size:11px;margin-bottom:16px">Download or share your game plan</div>';
  html+='<div class="stat-grid"><div class="stat-card"><div class="stat-v">'+tf+'/6</div><div class="stat-l">FIELDED</div></div><div class="stat-card"><div class="stat-v">'+tp+'/6</div><div class="stat-l">PITCHERS</div></div><div class="stat-card"><div class="stat-v">'+(S.batting.length||'—')+'</div><div class="stat-l">BATTING</div></div></div>';
  // Lineup grid
  html+='<div class="lbl" style="margin-bottom:8px">Full Lineup Card</div><div class="lc"><div class="lc-hdr"><div class="lc-h" style="text-align:left">POS</div>'+INN.map(function(i){return'<div class="lc-h">INN '+i+'</div>';}).join('')+'</div>';
  html+='<div class="lc-row p-row"><div class="lc-pos p">P</div>'+INN.map(function(i){var n=S.pitchers[i];var p=n?byName(n):null;return'<div class="lc-cell">'+(p?'<div class="lc-num">#'+p.number+'</div><div class="lc-nm">'+n.split(' ')[0]+'</div>':'<div class="lc-mt">—</div>')+'</div>';}).join('')+'</div>';
  ["C","1B","2B","3B","SS","LF","CF","RF"].forEach(function(pid,ri){
    html+='<div class="lc-row '+(ri%2===0?'e':'o')+'"><div class="lc-pos">'+pid+'</div>'+INN.map(function(i){var nm=(S.fields[i]||{})[pid];var p=nm?byName(nm):null;return'<div class="lc-cell">'+(p?'<div class="lc-num">#'+p.number+'</div><div class="lc-nm">'+nm.split(' ')[0]+'</div>':'<div class="lc-mt">—</div>')+'</div>';}).join('')+'</div>';
  });
  html+='</div>';
  // Batting preview
  if(S.batting.length){
    html+='<div class="lbl" style="margin-bottom:8px">Batting Order</div><div class="lc">';
    S.batting.forEach(function(name,i){var p=byName(name);html+='<div class="lc-row '+(i%2===0?'e':'o')+'" style="grid-template-columns:20px 36px 1fr"><div style="color:var(--y);font-weight:900;font-size:10px;display:flex;align-items:center">'+(i+1)+'</div><div style="display:flex;align-items:center"><div class="lc-num" style="font-size:10px">#'+(p?p.number:'')+'</div></div><div style="font-size:11px;font-weight:600;display:flex;align-items:center">'+name+'</div></div>';});
    html+='</div>';
  }
  // Buttons
  html+='<div class="lbl" style="margin-top:4px;margin-bottom:10px">Download &amp; Share</div><div class="exp-btns">';
  html+='<button class="exp-btn pri" onclick="dlFile(buildText(),&quot;DY-Lineup.txt&quot;,&quot;text/plain;charset=utf-8&quot;)">&#128196; DOWNLOAD TEXT (.txt)</button>';
  html+='<button class="exp-btn sec" onclick="dlCSV()">&#128202; DOWNLOAD SPREADSHEET (.csv)</button>';
  html+='<button class="exp-btn sec" style="background:#0f2e14;color:var(--y);border-color:var(--g)" onclick="doPDF()">&#128424; PRINT / SAVE AS PDF</button>';
  html+='<button class="exp-btn ter" onclick="showOverlay(buildText())">&#128203; COPY TO CLIPBOARD</button>';
  html+='</div><div style="border-top:1px solid rgba(26,92,42,.15);padding-top:16px;margin-top:4px"><div class="lbl" style="color:#c53935;margin-bottom:10px">New Game</div><button class="exp-btn danger" onclick="clearGame()">&#128258; CLEAR ALL &mdash; START NEW GAME</button></div></div>';
  return html;
}

function render(){
  var c=document.getElementById("content");
  switch(S.tab){
    case'game':   c.innerHTML=renderGame();break;
    case'field':  c.innerHTML=renderField();break;
    case'bat':    c.innerHTML=renderBat();break;
    case'pitch':  c.innerHTML=renderPitch();break;
    case'roster': c.innerHTML=renderRoster();break;
    case'export': c.innerHTML=renderExport();break;
  }
  // sync inning bar
  INN.forEach(function(n){document.getElementById("ib"+n).classList.toggle("on",n===S.inn);});
  // sync inning bar visibility
  var bar=document.getElementById("inn-bar");
  bar.style.display=(S.tab==="field"||S.tab==="pitch")?"flex":"none";
  // focus inputs
  var ni=document.getElementById("n-name");if(ni)setTimeout(function(){ni.focus();},50);
  var ei=document.getElementById("e-name");if(ei)setTimeout(function(){ei.focus();},50);
}

try{render();}catch(e){
  var rb=document.getElementById("content");
  rb.innerHTML="";
  var rd=document.createElement("div");
  rd.style.cssText="padding:30px;text-align:center";
  rd.innerHTML="<div style=\"font-size:40px\">&#9888;</div><div style=\"color:#e8e800;font-weight:900;font-size:16px;margin:12px 0\">Something went wrong</div><div style=\"color:#666;font-size:12px;margin-bottom:24px\">Tap to reset</div>";
  var resetBtn=document.createElement("button");
  resetBtn.textContent="RESET APP";
  resetBtn.style.cssText="background:#1a5c2a;border:1px solid #e8e800;border-radius:10px;color:#e8e800;font-weight:800;font-size:14px;padding:14px 24px";
  resetBtn.onclick=function(){LS.del("dy9u2");LS.del("dy9u_v");location.reload();};
  rd.appendChild(resetBtn);rb.appendChild(rd);
}
</script>
</body>
</html>
