<div id="toast"></div><script>
// ── State ──
const INNINGS = [1,2,3,4,5,6];
const POS_LABELS = {P:"Pitcher",C:"Catcher","1B":"1st Base","2B":"2nd Base","3B":"3rd Base",SS:"Shortstop",LF:"Left Field",CF:"Center Field",RF:"Right Field"};
const FIELD_POS = [{id:"CF",x:50,y:12},{id:"LF",x:18,y:22},{id:"RF",x:82,y:22},{id:"SS",x:35,y:42},{id:"2B",x:60,y:38},{id:"3B",x:22,y:56},{id:"1B",x:78,y:56},{id:"P",x:50,y:58},{id:"C",x:50,y:78}];
const initialPlayers = [
{name:"Joey Jenkins",number:11},
{name:"Bodhi Gardner",number:1},
{name:"Landon Sullivan",number:3},
{name:"Cody Brunetti",number:99},
{name:"Charles Hoppen",number:5},
{name:"Wiley Shea",number:8},
{name:"Henry Farrow",number:34},
{name:"Finn Hendrickx",number:17},
{name:"Rory Hendrickx",number:7},
{name:"Gregory Buckley",number:12},
{name:"Luke Bridges",number:44},
];
let state = {
players: [
{name:"Joey Jenkins",number:11},
{name:"Bodhi Gardner",number:1},
{name:"Landon Sullivan",number:3},
{name:"Cody Brunetti",number:99},
{name:"Charles Hoppen",number:5},
{name:"Wiley Shea",number:8},
{name:"Henry Farrow",number:34},
{name:"Finn Hendrickx",number:17},
{name:"Rory Hendrickx",number:7},
{name:"Gregory Buckley",number:12},
{name:"Luke Bridges",number:44},
],
innings:{1:{},2:{},3:{},4:{},5:{},6:{}},
batting:[],
pitchers:{1:null,2:null,3:null,4:null,5:null,6:null},
activeInning:1,
activeTab:"field",
selectedPlayer:null,
editingPlayerIdx:null,
addingPlayer:false,
};
function save(){
  try{
    if(typeof localStorage!=='undefined')
      localStorage.setItem("dy9u",JSON.stringify(state));
  }catch(e){}
}
function load(){
  try{
    if(typeof localStorage==='undefined')return;
    const d=localStorage.getItem("dy9u");
    if(!d)return;
    const s=JSON.parse(d);
    // Validate it's an object before merging
    if(typeof s!=='object'||s===null)return;
    Object.assign(state,s);
    // Migrate old per-inning batting {1:[],2:[],...} to single array
    if(state.batting&&!Array.isArray(state.batting)){
      state.batting=state.batting[1]||state.batting[Object.keys(state.batting)[0]]||[];
    }
    // Ensure all required keys exist
    if(!state.innings)state.innings={1:{},2:{},3:{},4:{},5:{},6:{}};
    if(!state.pitchers)state.pitchers={1:null,2:null,3:null,4:null,5:null,6:null};
    if(!Array.isArray(state.batting))state.batting=[];
    if(!Array.isArray(state.players)||!state.players.length)state.players=initialPlayers.map(p=>({...p}));
  }catch(e){
    try{localStorage.removeItem("dy9u");}catch(e2){}
  }
}
load();
function getPlayerByName(n){return state.players.find(p=>p.name===n);}
function getPlayerPosition(name){
const pos=state.innings[state.activeInning]||{};
return Object.entries(pos).find(([k,v])=>v===name)?.[0]||null;
}
// ── Tab / Inning ──
function showTab(t){
state.activeTab=t;
state.selectedPlayer=null;

function setInning(i){

render();

}
// ── Field ──
function selectPlayer(name){
state.selectedPlayer=state.selectedPlayer===name?null:name;
render();
}
function assignPosition(posId){
if(!state.selectedPlayer)return;
const cur={...state.innings[state.activeInning]};
Object.keys(cur).forEach(k=>{if(cur[k]===state.selectedPlayer)delete cur[k];});
cur[posId]=state.selectedPlayer;
state.innings[state.activeInning]=cur;
state.selectedPlayer=null;
render();save();
}
function clearPosition(posId){
const cur={...state.innings[state.activeInning]};
delete cur[posId];
state.innings[state.activeInning]=cur;
render();save();
}
function clearInning(){state.innings[state.activeInning]={};render();save();}
function copyPrevious(){
if(state.activeInning<=1)return;
state.innings[state.activeInning]={...state.innings[state.activeInning-1]};
render();save();
}
// ── Batting ──
function addToBatting(name){
if(state.batting.includes(name))return;
state.batting.push(name);
render();save();
}
function removeFromBatting(name){
state.batting=state.batting.filter(n=>n!==name);
render();save();
}
function moveBatter(idx,dir){
const arr=state.batting;
const ni=idx+dir;
if(ni<0||ni>=arr.length)return;
[arr[idx],arr[ni]]=[arr[ni],arr[idx]];
render();save();
}
// ── Pitchers ──
function togglePitcher(name){
state.pitchers[state.activeInning]=state.pitchers[state.activeInning]===name?null:name;
render();save();
}

function startEdit(idx){state.editingPlayerIdx=idx;render();}
function saveEdit(){
const nameEl=document.getElementById('edit-name');
const numEl=document.getElementById('edit-num');
if(!nameEl||!numEl)return;
const oldName=state.players[state.editingPlayerIdx].name;
const newName=nameEl.value.trim()||oldName;
const newNum=parseInt(numEl.value)||state.players[state.editingPlayerIdx].number;
state.players[state.editingPlayerIdx]={name:newName,number:newNum};
// Update all references
INNINGS.forEach(i=>{
Object.keys(state.innings[i]).forEach(pos=>{
if(state.innings[i][pos]===oldName)state.innings[i][pos]=newName;
});
state.batting=state.batting.map(n=>n===oldName?newName:n);
if(state.pitchers[i]===oldName)state.pitchers[i]=newName;
});
state.editingPlayerIdx=null;
render();save();
}
function cancelEdit(){state.editingPlayerIdx=null;render();}
function removePlayer(idx){
const name=state.players[idx].name;
state.players.splice(idx,1);
INNINGS.forEach(i=>{
Object.keys(state.innings[i]).forEach(pos=>{if(state.innings[i][pos]===name)delete state.innings[i][pos];});
state.batting=state.batting.filter(n=>n!==name);
if(state.pitchers[i]===name)state.pitchers[i]=null;
});
render();save();
}
function addPlayer(){

function exportText(){
const lines=[];
lines.push("DY 9U ALL-STARS — DENNIS/YARMOUTH");
lines.push("===================================");
lines.push("");
const pb=state.batting||[];
if(pb.length){
lines.push("BATTING ORDER");
lines.push("-------------");
pb.forEach((n,i)=>{
const p=getPlayerByName(n);
lines.push(`  ${i+1}. #${p?.number??'?'} ${n}`);
});
lines.push("");
}
lines.push("FIELDING BY INNING");
lines.push("------------------");
INNINGS.forEach(inn=>{
const pos=state.innings[inn]||{};
const pitcher=state.pitchers[inn];
if(!Object.keys(pos).length&&!pitcher)return;
lines.push(`Inning ${inn}:`);
if(pitcher){const p=getPlayerByName(pitcher);lines.push(`  P  (Pitcher)     — #${p?.number??'?'} ${pitcher}`);}
["C","1B","2B","3B","SS","LF","CF","RF"].forEach(pid=>{
if(pos[pid]){const p=getPlayerByName(pos[pid]);lines.push(`  ${pid.padEnd(3)}(${POS_LABELS[pid].padEnd(12)}) — #${p?.number??'?'} ${pos[pid]}`);}
});
lines.push("");
});
if(INNINGS.some(i=>state.pitchers[i])){
lines.push("PITCHING SUMMARY");
lines.push("----------------");
INNINGS.forEach(inn=>{if(state.pitchers[inn]){const p=getPlayerByName(state.pitchers[inn]);lines.push(`  Inning ${inn}: #${p?.number??'?'} ${state.pitchers[inn]}`);}});
lines.push("");
}
lines.push("ONE TEAM. ONE GOAL. ALL STARS. ALL HEART.");
return lines.join("\n");
}
function exportCSV(){
const rows=[["Inning","Position","#","Player","Pitching"]];
INNINGS.forEach(inn=>{
const pos=state.innings[inn]||{};
if(state.pitchers[inn]){const p=getPlayerByName(state.pitchers[inn]);rows.push([inn,"P (Pitcher)",p?.number??"",state.pitchers[inn],"YES"]);}
Object.entries(pos).forEach(([pid,name])=>{const p=getPlayerByName(name);rows.push([inn,`${pid} - ${POS_LABELS[pid]}`,p?.number??"",name,state.pitchers[inn]===name?"YES":""]);});
});
rows.push([]);rows.push(["BATTING ORDER (Inning 1)"]);rows.push(["Spot","#","Player"]);
(state.batting||[]).forEach((name,i)=>{const p=getPlayerByName(name);rows.push([i+1,p?.number??"",name]);});
return rows.map(r=>r.join(",")).join("\n");
}
function dlText(){
const content = exportText();
// On mobile Safari, open in a new page the user can share/save
const blob = new Blob([content], {type:'text/plain;charset=utf-8'});
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = 'DY-AllStars-Lineup.txt';
a.style.display = 'none';
document.body.appendChild(a);
a.click();
setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 1000);
// Fallback: show in overlay for manual copy
setTimeout(() => {
if(!document.hasFocus()) return; // download worked
showExportOverlay(content, 'DY-AllStars-Lineup.txt');
}, 800);
}
function dlCSV(){
const content = exportCSV();
const blob = new Blob([content], {type:'text/csv;charset=utf-8'});
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = 'DY-AllStars-Lineup.csv';
a.style.display = 'none';
document.body.appendChild(a);
a.click();
setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 1000);
setTimeout(() => {
if(!document.hasFocus()) return;
showExportOverlay(content, 'DY-AllStars-Lineup.csv');
}, 800);
}
function copyClipboard(){
const txt = exportText();
if(navigator.clipboard && navigator.clipboard.writeText){
navigator.clipboard.writeText(txt)
.then(() => showToast('✓ Copied to clipboard!'))
.catch(() => showExportOverlay(txt, 'lineup.txt'));
} else {
showExportOverlay(txt, 'lineup.txt');
}
}
function showExportOverlay(content, filename){

const overlay = document.createElement('div');
overlay.id = 'export-overlay';
overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;flex-direction:column;padding:16px;box-sizing:border-box';
overlay.innerHTML = `

<button onclick="document.getElementById('export-overlay').remove()" style="background:#1a5c2a;border:none;border-radius:50%;width:32px;height:32px;color:#e8e800;font-size:18px;cursor:pointer;font-weight:700">×</button>
</div>

<button onclick="selectExportText()" style="margin-top:10px;background:#1a5c2a;border:1px solid #e8e800;border-radius:10px;color:#e8e800;font-weight:800;font-size:14px;padding:14px;cursor:pointer">SELECT ALL TEXT</button>
`;
document.body.appendChild(overlay);
setTimeout(() => {

}, 100);
}
function selectExportText(){
const ta = document.getElementById('export-ta');
if(!ta) return;
ta.focus();
ta.select();
ta.setSelectionRange(0, ta.value.length);
// Try clipboard copy
if(navigator.clipboard && navigator.clipboard.writeText){
navigator.clipboard.writeText(ta.value).then(() => showToast('✓ Copied!')).catch(()=>{});
} else {
try{ document.execCommand('copy'); showToast('✓ Copied!'); } catch(e){}
}
}

html+=`<div class="footer"><div class="footer-main">ONE TEAM. ONE GOAL.</div><div class="footer-sub">ALL STARS. ALL HEART.</div></div></div>`;
return html;
}
function renderExport(){
const totalFielded=INNINGS.filter(i=>Object.keys(state.innings[i]||{}).length>0).length;
const totalPitchers=INNINGS.filter(i=>state.pitchers[i]).length;
const totalBatters=(state.batting||[]).length;
let html=`<div class="section">
<div class="section-label-y">Export Lineup</div>
<div style="color:#444;font-size:11px;margin-bottom:16px">Download or copy your complete game plan</div>
<div class="stat-grid">
<div class="stat-card"><div class="stat-val">${totalFielded}/6</div><div class="stat-lbl">INNINGS FIELDED</div></div>
<div class="stat-card"><div class="stat-val">${totalPitchers}/6</div><div class="stat-lbl">PITCHERS SET</div></div>
<div class="stat-card"><div class="stat-val">${totalBatters>0?totalBatters+' set':'None'}</div><div class="stat-lbl">BATTING ORDER</div></div>
</div>
<div class="section-label" style="margin-bottom:8px">Full Lineup Card</div>
<div class="lineup-card">
<div class="lc-header">
<div class="lc-hcell" style="text-align:left">POS</div>
${INNINGS.map(i=>`<div class="lc-hcell">INN ${i}</div>`).join('')}
</div>
<div class="lc-row pitcher">
<div class="lc-pos p">P</div>
${INNINGS.map(i=>{
const name=state.pitchers[i];const p=name?getPlayerByName(name):null;
return `<div class="lc-cell">${p?`<div class="lc-num">#${p.number}</div><div class="lc-name">${name.split(' ')[0]}</div>`:'<div class="lc-empty">—</div>'}</div>`;
}).join('')}
</div>
${["C","1B","2B","3B","SS","LF","CF","RF"].map((pid,ri)=>`
<div class="lc-row ${ri%2===0?'even':'odd'}">
<div class="lc-pos">${pid}</div>
${INNINGS.map(i=>{
const name=(state.innings[i]||{})[pid];const p=name?getPlayerByName(name):null;
return `<div class="lc-cell">${p?`<div class="lc-num">#${p.number}</div><div class="lc-name">${name.split(' ')[0]}</div>`:'<div class="lc-empty">—</div>'}</div>`;
}).join('')}
</div>`).join('')}
</div>`;
const bat1=state.batting||[];
if(bat1.length){
html+=`<div class="section-label" style="margin-bottom:8px">Batting Order</div>
<div class="lineup-card" style="margin-bottom:18px">`;
bat1.forEach((name,i)=>{
const p=getPlayerByName(name);
const fpos=Object.entries(state.innings[state.activeInning]||{}).find(([k,v])=>v===name)?.[0]||'—';
html+=`<div class="bat-preview-item ${i%2===0?'even':'odd'}">
<div class="bp-spot">${i+1}</div>
<div class="bp-num">#${p?.number??'?'}</div>
<span class="bp-name">${name}</span>
<span class="bp-pos">${fpos}</span>
</div>`;
});
html+=`</div>`;
}
html+=`<div class="section-label" style="margin-bottom:10px">Download / Share</div>
<div class="export-btns">
<button class="exp-btn primary" onclick="dlText()">📄 TEXT FILE — tap to download / copy</button>
<button class="exp-btn secondary" onclick="dlCSV()">📊 SPREADSHEET (.csv) — download / copy</button>
<button class="exp-btn secondary" onclick="exportPDF()" style="background:#0f2e14;color:#e8e800;border-color:#1a5c2a">🖨️ PRINT / SAVE AS PDF</button>
<button class="exp-btn tertiary" onclick="copyClipboard()">📋 COPY TO CLIPBOARD</button>
</div>
</div>`;
return html;
}
function renderGame(){
const hasAny = INNINGS.some(i=>Object.keys(state.innings[i]||{}).length>0||state.pitchers[i]);
if(!hasAny){
return `<div class="section"><div class="gv-no-data">
<div class="gv-no-icon">⚾</div>
<div class="gv-no-text">No lineup built yet</div>
<div class="gv-no-sub">Set your fielding positions and pitchers<br>then come back here for game day</div>
</div></div>`;
}
const POS_ORDER = ["C","1B","2B","3B","SS","LF","CF","RF"];
let html = `<div style="padding:12px 14px 0">
<div style="color:var(--yellow);font-weight:900;font-size:16px;letter-spacing:1px">GAME DAY VIEW</div>
<div style="color:#444;font-size:11px;margin-top:2px;margin-bottom:14px">Read-only · All innings at a glance</div>`;

INNINGS.forEach(inn=>{
const pos = state.innings[inn]||{};
const pitcher = state.pitchers[inn];
const filledCount = Object.keys(pos).length + (pitcher?1:0);
if(filledCount===0)return;

html+=`<div class="gv-inning">
<div class="gv-inn-header">
<div class="gv-inn-num">${inn}</div>
<div>
<div style="color:#0d1a0f;font-weight:900;font-size:13px;letter-spacing:1px">INNING ${inn}</div>
<div style="color:rgba(0,30,0,.6);font-size:10px;font-weight:600">${filledCount} of 9 positions set</div>
</div>
</div>`;

// Pitcher row
if(pitcher){
const p=getPlayerByName(pitcher);
html+=`<div class="gv-pitcher">
<div class="gv-pitcher-badge">PITCHER</div>
<div style="flex:1">
<span class="gv-pitcher-name">${pitcher}</span>
</div>
<div class="gv-pitcher-num">#${p?.number??'?'}</div>
</div>`;
}

// Position grid
const filledPos = POS_ORDER.filter(pid=>pos[pid]);
if(filledPos.length){
html+=`<div class="gv-pos-grid">`;
filledPos.forEach(pid=>{
const name=pos[pid];
const p=getPlayerByName(name);
html+=`<div class="gv-pos-item">
<div class="gv-pos-tag">${pid}</div>
<div class="gv-pos-num">#${p?.number??'?'}</div>
<div class="gv-pos-name">${name.split(' ')[0]}</div>
</div>`;
});
// pad to even number
if(filledPos.length%2!==0) html+=`<div class="gv-pos-item"></div>`;
html+=`</div>`;
}
html+=`</div>`;
});

// Batting order at the bottom
const bat = state.batting||[];
if(bat.length){
html+=`<div class="gv-inning" style="margin-top:4px">
<div class="gv-inn-header" style="background:#1a3a0a">
<div style="font-size:18px">🏏</div>
<div>
<div style="color:#0d1a0f;font-weight:900;font-size:13px;letter-spacing:1px">BATTING ORDER</div>
<div style="color:rgba(0,30,0,.6);font-size:10px;font-weight:600">All innings · ${bat.length} batters</div>
</div>
</div>
<div style="padding:10px 14px">`;
bat.forEach((name,i)=>{
const p=getPlayerByName(name);
html+=`<div class="gv-bat-row">
<div class="gv-bat-spot">${i+1}</div>
<div class="gv-bat-num">#${p?.number??'?'}</div>
<div class="gv-bat-name">${name}</div>
</div>`;
});
html+=`</div></div>`;
}
html+=`</div>`;
return html;
}

function render(){
const content=document.getElementById('content');
switch(state.activeTab){
case 'game':    content.innerHTML=renderGame();break;
case 'field':   content.innerHTML=renderField();break;
case 'batting': content.innerHTML=renderBatting();break;
case 'pitches': content.innerHTML=renderPitches();break;
case 'roster':  content.innerHTML=renderRoster();break;
case 'export':  content.innerHTML=renderExport();break;
}
// Sync inning buttons
INNINGS.forEach(n=>document.getElementById('inn'+n).classList.toggle('active',n===state.activeInning));
// Focus new player input if visible
const ni=document.getElementById('new-name');
if(ni)setTimeout(()=>ni.focus(),50);
const ei=document.getElementById('edit-name');
if(ei)setTimeout(()=>ei.focus(),50);
const bar=document.getElementById('inning-bar');
bar.style.display=(state.activeTab==='field'||state.activeTab==='pitches')?'flex':'none';
}
render();
</script></body>
</html>
